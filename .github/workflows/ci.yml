name: Calculator unit and E2E tests
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v6

      - name: Docker build image
        run: docker build --no-cache -t ci-cd-app .

      - name: Run unit tests
        run: docker run --rm ci-cd-app pytest

      - name: Create Docker network
        run: docker network create e2e-tests-network || true

      - name: Start application server
        run: |
          docker run -d --name application \
          -p 5000:5000 \
          --network e2e-tests-network \
          ci-cd-app

      - name: Wait for application
        run: |
          echo "Waiting for application..."
          
          for i in {1..20}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "Application is up!"
              break
            fi
            
            echo "Waiting..."
            sleep 2
          done

      - name: Checkout tests repository
        uses: actions/checkout@v6
        with:
          repository: KarolWeber/ci-cd-tests
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tests image
        run: docker build -t e2e-tests .

      - name: Run e2e
        run: |
          docker run --rm \
          --network e2e-tests-network \
          -e BASE_URL=http://application:5000 \
          e2e-tests

      - name: Load test report history
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build test report
        uses: simple-elf/allure-report-action@v1.7
        if: always()
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: build/allure-results

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history


      - name: Cleanup Docker containers
        if: always()
        run: docker rm -f application e2e-tests || true


