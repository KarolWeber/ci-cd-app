name: Calculator unit and E2E tests
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout repo z aplikacją
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2️⃣ Build obrazu Docker (opcjonalnie, np. do deployu)
      - name: Build Docker image
        run: docker build --no-cache -t ci-cd-app .

      # 3️⃣ Run unit tests w kontenerze
      - name: Run unit tests
        run: docker run --rm ci-cd-app pytest

      # 4️⃣ Checkout repo z testami e2e
      - name: Checkout e2e repository
        uses: actions/checkout@v4
        with:
          repository: KarolWeber/ci-cd-tests
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-cd-tests

      # 5️⃣ Run Flask app in background (bez kontenera)
      - name: Start app in background
        run: |
          python app/app.py &
          APP_PID=$!
          echo "Waiting 5s for app to start..."
          sleep 5
          echo "App should be ready on http://127.0.0.1:5000"

      # 6️⃣ Run e2e tests
      - name: Run e2e tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ci-cd-tests/requirements.txt
          pytest ci-cd-tests/tests
        env:
          BASE_URL: http://127.0.0.1:5000

      # 7️⃣ Stop app after tests
      - name: Stop app
        run: kill $APP_PID || true