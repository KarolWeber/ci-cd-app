name: Calculator unit and E2E tests
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout repo z aplikacją
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2️⃣ Build obrazu Docker (opcjonalnie, np. do deployu)
      - name: Build Docker image
        run: docker build --no-cache -t ci-cd-app .

      # 3️⃣ Run unit tests w kontenerze
      - name: Run unit tests
        run: docker run --rm ci-cd-app pytest

      # 4️⃣ Checkout repo z testami e2e
      - name: Checkout e2e repository
        uses: actions/checkout@v4
        with:
          repository: KarolWeber/ci-cd-tests
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-cd-tests

      - name: Run e2e tests with app
        run: |
          # Start app in background
          python app/app.py &
          APP_PID=$!
      
          # Poczekaj chwilę, żeby Flask wystartował
          for i in {1..15}; do
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/add?a=1&b=1 && break
            echo "Waiting for app..."
            sleep 2
          done
      
          # Run e2e tests
          python -m pip install --upgrade pip
          python -m pip install -r ci-cd-tests/requirements.txt
          pytest ci-cd-tests/tests
      
          # Stop Flask after tests
          kill $APP_PID